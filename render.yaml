services:
  - type: web
    name: tax-certificate-module
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: LINK_SIGNING_SECRET
        generateValue: true
      - key: DISPATCH_POLL_SECONDS
        value: "30"
      - key: STORAGE_DIR
        value: /app/storage
